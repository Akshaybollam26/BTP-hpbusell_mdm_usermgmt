_schema-version: 3.3.0
ID: BTP-hpbuysell_mdm_UserMgmt
description: A simple CAP project.
version: 1.0.0
modules:
  - name: BTP-hpbuysell_mdm_UserMgmt-srv
    type: nodejs
    path: gen/srv
    requires:
      - name: uaa_BTP-hpbuysell_mdm_UserMgmt
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    parameters:
      buildpack: nodejs_buildpack
      instances: 1
    build-parameters:
      builder: npm-ci
  - name: BTP-hpbuysell_mdm_UserMgmt-destination-content
    type: com.sap.application.content
    requires:
      - name: BTP-hpbuysell_mdm_UserMgmt-destination-service
        parameters:
          content-target: true
      - name: BTP-hpbuysell_mdm_UserMgmt_html_repo_host
        parameters:
          service-key:
            name: BTP-hpbuysell_mdm_UserMgmt_html_repo_host-key
      - name: uaa_BTP-hpbuysell_mdm_UserMgmt
        parameters:
          service-key:
            name: uaa_BTP-hpbuysell_mdm_UserMgmt-key
    parameters:
      content:
        instance:
          destinations:
            - Name: approuter_BTP_hpbuysell_mdm_UserMgmt_html_repo_host
              ServiceInstanceName: BTP-hpbuysell_mdm_UserMgmt-html5-app-host-service
              ServiceKeyName: BTP-hpbuysell_mdm_UserMgmt_html_repo_host-key
              sap.cloud.service: approuter
            - Authentication: OAuth2UserTokenExchange
              Name: approuter_uaa_BTP_hpbuysell_mdm_UserMgmt
              ServiceInstanceName: BTP-hpbuysell_mdm_UserMgmt-xsuaa-service
              ServiceKeyName: uaa_BTP-hpbuysell_mdm_UserMgmt-key
              sap.cloud.service: approuter
          existing_destinations_policy: ignore
    build-parameters:
      no-source: true
  - name: BTP-hpbuysell_mdm_UserMgmt-app-content
    type: com.sap.application.content
    path: .
    requires:
      - name: BTP-hpbuysell_mdm_UserMgmt_html_repo_host
        parameters:
          content-target: true
    build-parameters:
      build-result: resources
      requires:
        - artifacts:
            - hpbuysellmdmusermgmtui.zip
          name: hpbuysellmdmusermgmtui
          target-path: resources/
  - name: hpbuysellmdmusermgmtui
    type: html5
    path: app/usermgmtui
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npm run build:cf
      supported-platforms:
        []
resources:
  - name: BTP-hpbuysell_mdm_UserMgmt-destination-service
    type: org.cloudfoundry.managed-service
    parameters:
      config:
        HTML5Runtime_enabled: true
        init_data:
          instance:
            destinations:
              - Authentication: NoAuthentication
                Name: ui5
                ProxyType: Internet
                Type: HTTP
                URL: https://ui5.sap.com
              - Authentication: NoAuthentication
                HTML5.DynamicDestination: true
                HTML5.ForwardAuthToken: true
                Name: srv-api
                ProxyType: Internet
                Type: HTTP
                URL: ~{srv-api/srv-url}
            existing_destinations_policy: update
        version: 1.0.0
      service: destination
      service-name: BTP-hpbuysell_mdm_UserMgmt-destination-service
      service-plan: lite
    requires:
      - name: srv-api
  - name: BTP-hpbuysell_mdm_UserMgmt_html_repo_host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-name: BTP-hpbuysell_mdm_UserMgmt-html5-app-host-service
      service-plan: app-host
  - name: uaa_BTP-hpbuysell_mdm_UserMgmt
    type: org.cloudfoundry.managed-service
    parameters:
      path: ./xs-security.json
      service: xsuaa
      service-name: BTP-hpbuysell_mdm_UserMgmt-xsuaa-service
      service-plan: application
      config:
        xsappname: BTP-hpbuysell_mdm_UserMgmt-${org}-${space}
        tenant-mode: dedicated
        oauth2-configuration:
          credential-types:
            - "binding-secret"
            - "x509"
        role-collections:
          - name: 'UsermgmtViewer (BTP-hpbuysell_mdm_UserMgmt ${org}-${space})'
            description: 'generated'
            role-template-references:
              - '$XSAPPNAME.UsermgmtViewer'
          - name: 'UsermgmtManage (BTP-hpbuysell_mdm_UserMgmt ${org}-${space})'
            description: 'generated'
            role-template-references:
              - '$XSAPPNAME.UsermgmtManage'
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
